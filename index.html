<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Lite</title>

    <style>
        :root {
            --sidebar: #111827;
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 250px;
            background: var(--sidebar);
            color: white;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.08);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .nav {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            color: #cbd5e1;
            transition: 0.3s;
            font-weight: 600;
        }

        .nav:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }

        .nav.active {
            background: rgba(255,255,255,0.08);
            border-left: 4px solid var(--primary);
            color: white;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .topbar h2 {
            color: var(--text);
            margin-bottom: 5px;
        }

        .topbar small {
            color: var(--muted);
        }

        .search {
            width: 250px;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            outline: none;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            border-radius: 22px;
            padding: 24px;
            border: 1px solid #f1f5f9;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
        }

        .card small {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .card h1 {
            margin-top: 10px;
            color: var(--text);
            font-size: 30px;
        }

        .analytics {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-box {
            background: white;
            border-radius: 22px;
            padding: 24px;
            border: 1px solid #f1f5f9;
            min-height: 300px;
            transition: 0.3s;
        }

        .chart-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
        }

        .chart-box small {
            color: var(--muted);
            font-weight: 700;
        }

        .bar-container {
            height: 220px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-top: 30px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(to top, #6366f1, #818cf8);
            border-radius: 10px 10px 0 0;
            position: relative;
            transition: 0.3s;
            min-height: 10px;
        }

        .bar:hover::after {
            content: attr(data-label);
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: white;
            font-size: 11px;
            padding: 5px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .ratio-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .ratio-bar {
            width: 100%;
            height: 24px;
            background: #f1f5f9;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            margin-top: 30px;
        }

        .income-bar {
            background: var(--green);
            height: 100%;
            width: 50%;
        }

        .expense-bar {
            background: var(--red);
            height: 100%;
            width: 50%;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 13px;
        }

        .table-card {
            background: white;
            border-radius: 22px;
            padding: 24px;
            border: 1px solid #f1f5f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            color: var(--muted);
            font-size: 13px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        td {
            padding: 15px 0;
            border-bottom: 1px solid #f8fafc;
            font-size: 14px;
        }

        .form-card {
            max-width: 500px;
            background: white;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #f1f5f9;
        }

        .form-card h3 {
            margin-bottom: 20px;
            color: var(--text);
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        @media(max-width: 900px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            aside {
                width: 100%;
                flex-direction: row;
                align-items: center;
                overflow-x: auto;
                gap: 10px;
            }

            .grid-3,
            .analytics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">👑 FinTrack</div>

        <div class="nav active" onclick="goPage('dashboard', this)">
            📊 Dashboard
        </div>

        <div class="nav" onclick="goPage('transaction', this)">
            💸 Transactions
        </div>
    </aside>

    <main>

        <section id="dashboard" class="page active">

            <div class="topbar">
                <div>
                    <h2>Financial Overview</h2>
                    <small>Welcome back, your finance summary today.</small>
                </div>

                <input type="text" class="search" placeholder="Search transaction...">
            </div>

            <div class="grid-3">
                <div class="card">
                    <small>TOTAL BALANCE</small>
                    <h1 id="balance">Rp 0</h1>
                </div>

                <div class="card">
                    <small style="color:#10b981">TOTAL INCOME</small>
                    <h1 id="income">Rp 0</h1>
                </div>

                <div class="card">
                    <small style="color:#ef4444">TOTAL EXPENSE</small>
                    <h1 id="expense">Rp 0</h1>
                </div>
            </div>

            <div class="analytics">

                <div class="chart-box">
                    <small>SPENDING ANALYSIS</small>
                    <div class="bar-container" id="barChart"></div>
                </div>

                <div class="chart-box">
                    <div class="ratio-wrap">
                        <small>INCOME vs EXPENSE</small>

                        <div class="ratio-bar">
                            <div id="incomeBar" class="income-bar"></div>
                            <div id="expenseBar" class="expense-bar"></div>
                        </div>

                        <div class="legend">
                            <span style="color:#10b981">● Income</span>
                            <span style="color:#ef4444">● Expense</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-card">
                <small style="color:#94a3b8;font-weight:700;">
                    RECENT TRANSACTIONS
                </small>

                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Amount</th>
                        </tr>
                    </thead>

                    <tbody id="tableData"></tbody>
                </table>
            </div>

        </section>

        <section id="transaction" class="page">

            <div class="form-card">
                <h3>Add New Transaction</h3>

                <input
                    type="text"
                    id="displayNominal"
                    placeholder="Nominal"
                    oninput="formatNominal(this)">

                <input type="hidden" id="realNominal">

                <input
                    type="text"
                    id="description"
                    placeholder="Description">

                <select id="type">
                    <option value="income">Income (+)</option>
                    <option value="expense">Expense (-)</option>
                </select>

                <input type="date" id="date">

                <button onclick="saveTransaction()">
                    Save Transaction
                </button>
            </div>

        </section>

    </main>

    <script>

        let db = JSON.parse(localStorage.getItem('fintrack_lite')) || [];

        function rupiah(number) {
            return 'Rp ' + number.toLocaleString('id-ID');
        }

        function formatNominal(input) {
            let value = input.value.replace(/\D/g, '');
            document.getElementById('realNominal').value = value;
            input.value = new Intl.NumberFormat('id-ID').format(value);
        }

        function goPage(id, el) {

            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            document.getElementById(id).classList.add('active');

            document.querySelectorAll('.nav').forEach(nav => {
                nav.classList.remove('active');
            });

            el.classList.add('active');

            renderDashboard();
        }

        function saveTransaction() {

            const nominal = document.getElementById('realNominal').value;
            const description = document.getElementById('description').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;

            if(!nominal || !description || !date) {
                alert('Please fill all fields');
                return;
            }

            db.push({
                nominal: parseInt(nominal),
                description,
                type,
                date
            });

            localStorage.setItem('fintrack_lite', JSON.stringify(db));

            alert('Transaction saved');

            location.reload();
        }

        function renderDashboard() {

            let income = 0;
            let expense = 0;

            const table = document.getElementById('tableData');
            const chart = document.getElementById('barChart');

            table.innerHTML = '';
            chart.innerHTML = '';

            db.sort((a,b) => new Date(a.date) - new Date(b.date));

            db.forEach(item => {

                if(item.type === 'income') {
                    income += item.nominal;
                } else {
                    expense += item.nominal;
                }

                const bar = document.createElement('div');
                bar.className = 'bar';

                const total = income + expense || 1;

                let percent = ((item.nominal / total) * 100);

                bar.style.height = Math.max(percent, 10) + '%';

                bar.setAttribute('data-label', rupiah(item.nominal));

                chart.appendChild(bar);
            });

            document.getElementById('balance').innerText = rupiah(income - expense);
            document.getElementById('income').innerText = rupiah(income);
            document.getElementById('expense').innerText = rupiah(expense);

            const totalMoney = income + expense || 1;

            document.getElementById('incomeBar').style.width =
                (income / totalMoney * 100) + '%';

            document.getElementById('expenseBar').style.width =
                (expense / totalMoney * 100) + '%';

            db.slice().reverse().slice(0, 8).forEach(item => {

                table.innerHTML += `
                    <tr>
                        <td>${item.description}</td>
                        <td>${item.date}</td>
                        <td style="color:${item.type === 'income' ? '#10b981' : '#ef4444'}">
                            ${item.type}
                        </td>
                        <td style="color:${item.type === 'income' ? '#10b981' : '#ef4444'}">
                            ${rupiah(item.nominal)}
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('date').valueAsDate = new Date();

        renderDashboard();

    </script>
</body>
</html>
