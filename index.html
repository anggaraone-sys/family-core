<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCore Dashboard</title>
    <style>
        /* CSS INTERNAL - Agar loading instan & tampilan langsung rapi */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; min-height: 100 screen; }
        
        /* Layout Sidebar & Main */
        .container { display: flex; flex-wrap: wrap; }
        aside { width: 250px; background: #fff; padding: 20px; border-right: 1px solid #ddd; min-height: 100vh; }
        main { flex: 1; padding: 30px; background: #f8fafc; }
        
        .logo { font-size: 24px; font-weight: bold; color: #4f46e5; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px; border-radius: 10px; background: #4f46e5; color: white; font-weight: 600; margin-bottom: 10px; cursor: pointer; }

        /* Dashboard Cards */
        .grid-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card p { margin: 0; font-size: 14px; color: #64748b; font-weight: 600; }
        .card h2 { margin: 10px 0 0; font-size: 24px; color: #1e293b; }
        
        /* Form & History */
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .form-section, .history-section { background: white; padding: 25px; border-radius: 25px; border: 1px solid #eee; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; background: #f9fafb; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #4f46e5; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4338ca; }

        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .text-green { color: #10b981; font-weight: bold; }
        .text-red { color: #ef4444; font-weight: bold; }

        @media (max-width: 768px) { aside { width: 100%; min-height: auto; } .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <aside>
            <div class="logo"><span>🟦</span> FinCore</div>
            <div class="nav-item">🏠 Dashboard</div>
            <div style="color:#94a3b8; padding:12px;">💸 Transaksi</div>
        </aside>

        <main>
            <h1 style="margin-top:0; color:#1e293b;">Main Dashboard</h1>
            
            <div class="grid-top">
                <div class="card">
                    <p>Total Balance</p>
                    <h2 id="totalSaldo" style="color:#4f46e5">Rp 0</h2>
                </div>
                <div class="card">
                    <p>Total Income</p>
                    <h2 id="totalMasuk" style="color:#10b981">Rp 0</h2>
                </div>
                <div class="card">
                    <p>Total Expenses</p>
                    <h2 id="totalKeluar" style="color:#ef4444">Rp 0</h2>
                </div>
            </div>

            <div class="content-grid">
                <div class="form-section">
                    <h3 style="margin-top:0">Tambah Transaksi</h3>
                    <input type="number" id="nominal" placeholder="Nominal (Rp)">
                    <input type="text" id="ket" placeholder="Keterangan (Gaji, Makan, dll)">
                    <select id="tipe">
                        <option value="Pemasukan">Pemasukan (+)</option>
                        <option value="Pengeluaran">Pengeluaran (-)</option>
                    </select>
                    <input type="date" id="tgl">
                    <button onclick="simpan()">Simpan Transaksi</button>
                </div>

                <div class="history-section">
                    <h3 style="margin-top:0">Riwayat Terakhir</h3>
                    <div id="daftar"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('fincore_v3')) || [];

        function simpan() {
            const nom = document.getElementById('nominal').value;
            const ket = document.getElementById('ket').value;
            const tgl = document.getElementById('tgl').value;
            const tipe = document.getElementById('tipe').value;

            if(!nom || !ket || !tgl) return alert("Mohon isi semua data!");

            data.push({ id: Date.now(), nom: parseInt(nom), ket, tgl, tipe });
            localStorage.setItem('fincore_v3', JSON.stringify(data));
            render();
            
            document.getElementById('nominal').value = '';
            document.getElementById('ket').value = '';
        }

        function render() {
            const list = document.getElementById('daftar');
            list.innerHTML = '';
            let masuk = 0, keluar = 0;

            [...data].reverse().forEach(item => {
                if(item.tipe === 'Pemasukan') masuk += item.nom;
                else keluar += item.nom;

                list.innerHTML += `
                    <div class="history-item">
                        <div>
                            <div style="font-weight:bold; color:#334155">${item.ket}</div>
                            <div style="font-size:11px; color:#94a3b8">${item.tgl}</div>
                        </div>
                        <div class="${item.tipe === 'Pemasukan' ? 'text-green' : 'text-red'}">
                            ${item.tipe === 'Pemasukan' ? '+' : '-'} ${item.nom.toLocaleString()}
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalMasuk').innerText = `Rp ${masuk.toLocaleString()}`;
            document.getElementById('totalKeluar').innerText = `Rp ${keluar.toLocaleString()}`;
            document.getElementById('totalSaldo').innerText = `Rp ${(masuk - keluar).toLocaleString()}`;
        }

        document.getElementById('tgl').valueAsDate = new Date();
        render();
    </script>
</body>
</html>
