<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home Finance</title>

<style>
:root{
    --bg:#0f1b33;
    --card:#17365f;
    --card2:#1d4f83;
    --text:#ffffff;
    --muted:#8fa6c9;
    --blue:#28c5ff;
    --purple:#a832ff;
    --green:#35e58a;
    --red:#ff5b7f;
    --orange:#ff9f1c;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

/* LOGIN */

#loginPage{
    min-height:100vh;
    padding:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    radial-gradient(circle at 30% 20%,rgba(40,197,255,.25),transparent 35%),
    linear-gradient(160deg,#102a4d,#111a32);
}

.login-card{
    width:100%;
    max-width:420px;
    text-align:center;
}

.logo-big{
    width:160px;
    height:160px;
    margin:0 auto 25px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:74px;
    box-shadow:0 25px 60px rgba(168,50,255,.35);
}

.login-card h1{
    font-size:36px;
    margin-bottom:12px;
}

.login-card p{
    color:var(--muted);
    margin-bottom:35px;
}

.login-card input{
    width:100%;
    padding:17px;
    border:none;
    border-radius:18px;
    background:#1b3155;
    color:white;
    outline:none;
    font-size:16px;
    margin-bottom:18px;
}

.login-card input::placeholder{
    color:#8197b8;
}

.login-card button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:30px;
    color:white;
    font-size:16px;
    font-weight:700;
    background:linear-gradient(90deg,var(--purple),var(--blue));
}

/* APP */

#app{
    display:none;
    min-height:100vh;
    padding-bottom:95px;
}

/* HEADER */

.header{
    padding:25px 22px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.user-chip{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar{
    width:46px;
    height:46px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.header h3{
    font-size:20px;
}

.header small{
    color:var(--muted);
}

.logout{
    border:none;
    background:#1b3155;
    color:white;
    border-radius:14px;
    padding:10px 12px;
}

/* PAGE */

.page{
    display:none;
    padding:16px 22px;
}

.page.active{
    display:block;
}

/* BALANCE HERO */

.balance-card{
    background:
    radial-gradient(circle at 90% 20%,rgba(168,50,255,.35),transparent 30%),
    linear-gradient(145deg,#17365f,#111b35);
    border-radius:32px;
    padding:28px;
    margin-bottom:22px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.balance-card small{
    color:var(--muted);
}

.balance-card h1{
    font-size:42px;
    margin:12px 0 18px;
    letter-spacing:-1px;
}

.pill{
    display:inline-flex;
    gap:14px;
    padding:12px 20px;
    border-radius:30px;
    background:linear-gradient(90deg,var(--purple),#5967ff);
    font-size:14px;
    font-weight:700;
}

/* QUICK CARDS */

.quick-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:22px;
}

.quick-card{
    background:#183b67;
    border-radius:24px;
    padding:20px;
}

.quick-card small{
    color:var(--muted);
}

.quick-card h2{
    margin-top:8px;
    font-size:24px;
}

/* CHART */

.chart-card{
    background:#132747;
    border-radius:30px;
    padding:22px;
    margin-bottom:22px;
}

.chart-card small{
    color:var(--muted);
    font-weight:700;
}

.line-chart{
    width:100%;
    height:190px;
    margin-top:15px;
}

.ratio-wrap{
    margin-top:18px;
}

.ratio-bar{
    height:12px;
    border-radius:20px;
    overflow:hidden;
    background:#2b4268;
    display:flex;
}

.income-bar{
    background:linear-gradient(90deg,var(--blue),var(--green));
}

.expense-bar{
    background:linear-gradient(90deg,var(--orange),var(--red));
}

/* LIST */

.section-title{
    font-size:20px;
    margin:14px 0;
}

.search{
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    background:#1b3155;
    color:white;
    outline:none;
    margin-bottom:18px;
}

.search::placeholder{
    color:#8197b8;
}

.list{
    display:flex;
    flex-direction:column;
    gap:13px;
}

.tx-card{
    background:#183b67;
    border-radius:22px;
    padding:17px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tx-left{
    display:flex;
    align-items:center;
    gap:13px;
}

.tx-icon{
    width:42px;
    height:42px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--purple),var(--blue));
}

.tx-card h4{
    font-size:15px;
}

.tx-card small{
    color:var(--muted);
}

.amount-income{
    color:var(--green);
    font-weight:800;
}

.amount-expense{
    color:var(--red);
    font-weight:800;
}

.edit-btn{
    border:none;
    background:#244f83;
    color:white;
    border-radius:12px;
    padding:8px 12px;
    margin-top:7px;
}

/* MONTHLY */

.month-card{
    background:#183b67;
    border-radius:24px;
    padding:20px;
    margin-bottom:14px;
}

.month-card h3{
    margin-bottom:14px;
}

.month-row{
    display:flex;
    justify-content:space-between;
    margin:9px 0;
    color:var(--muted);
}

.month-row strong{
    color:white;
}

/* BOTTOM NAV */

.bottom-nav{
    position:fixed;
    left:18px;
    right:18px;
    bottom:18px;
    height:72px;
    border-radius:28px;
    background:linear-gradient(90deg,var(--blue),var(--purple));
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 18px 45px rgba(0,0,0,.35);
    z-index:90;
}

.nav-item{
    border:none;
    background:transparent;
    color:white;
    font-size:23px;
    opacity:.75;
}

.nav-item.active{
    opacity:1;
    transform:scale(1.15);
}

/* FAB */

#fab{
    position:fixed;
    left:50%;
    bottom:58px;
    transform:translateX(-50%);
    width:68px;
    height:68px;
    border-radius:50%;
    border:6px solid var(--bg);
    background:linear-gradient(135deg,var(--purple),var(--blue));
    color:white;
    font-size:34px;
    z-index:100;
    box-shadow:0 15px 40px rgba(168,50,255,.45);
}

/* MODAL */

#modalBg{
    position:fixed;
    inset:0;
    background:rgba(5,10,20,.72);
    backdrop-filter:blur(6px);
    display:none;
    align-items:flex-end;
    z-index:200;
}

#modalBg.active{
    display:flex;
}

.modal{
    width:100%;
    background:#132747;
    border-radius:32px 32px 0 0;
    padding:25px 22px 30px;
}

.modal h2{
    margin-bottom:20px;
}

.modal input,
.modal select{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#1b3155;
    color:white;
    outline:none;
    margin-bottom:14px;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:22px;
    font-weight:800;
}

.save{
    background:linear-gradient(90deg,var(--purple),var(--blue));
    color:white;
}

.cancel{
    margin-top:10px;
    background:#263b5f;
    color:white;
}

/* RESPONSIVE */

@media(min-width:600px){
    body{
        display:flex;
        justify-content:center;
        background:#071025;
    }

    #app,
    #loginPage{
        width:430px;
        max-width:430px;
    }

    #app{
        background:var(--bg);
        min-height:100vh;
    }

    .bottom-nav{
        left:50%;
        transform:translateX(-50%);
        width:390px;
    }

    #fab{
        left:50%;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
    <div class="login-card">
        <div class="logo-big">💰</div>
        <h1>Home Finance</h1>
        <p>Manage your home money smarter</p>

        <input type="text" id="username" placeholder="Masukkan username">

        <button onclick="login()">Join Us</button>
    </div>
</div>

<!-- APP -->

<div id="app">

    <div class="header">
        <div class="user-chip">
            <div class="avatar">👤</div>
            <div>
                <h3 id="welcomeText">Welcome</h3>
                <small>Home Finance</small>
            </div>
        </div>

        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- DASHBOARD -->

    <section id="dashboard" class="page active">

        <div class="balance-card">
            <small>Total Balance</small>
            <h1 id="balance">Rp 0</h1>

            <div class="pill">
                <span id="incomeMini">+ Rp 0</span>
                <span>|</span>
                <span id="expenseMini">- Rp 0</span>
            </div>
        </div>

        <div class="quick-grid">
            <div class="quick-card">
                <small>Income</small>
                <h2 id="income">Rp 0</h2>
            </div>

            <div class="quick-card">
                <small>Expense</small>
                <h2 id="expense">Rp 0</h2>
            </div>
        </div>

        <div class="chart-card">
            <small>Finance Graph</small>

            <svg class="line-chart" viewBox="0 0 600 220">
                <polyline
                    id="lineChart"
                    fill="none"
                    stroke="#28c5ff"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round">
                </polyline>
            </svg>

            <div class="ratio-wrap">
                <div class="ratio-bar">
                    <div id="incomeBar" class="income-bar"></div>
                    <div id="expenseBar" class="expense-bar"></div>
                </div>
            </div>
        </div>

        <h3 class="section-title">Recent Transactions</h3>
        <div id="recentList" class="list"></div>

    </section>

    <!-- TRANSACTIONS -->

    <section id="transactions" class="page">

        <h3 class="section-title">Transaction History</h3>

        <input
            class="search"
            id="historySearch"
            placeholder="Search transaction..."
            oninput="renderHistory()">

        <div id="historyList" class="list"></div>

    </section>

    <!-- MONTHLY -->

    <section id="monthly" class="page">

        <h3 class="section-title">Monthly Report</h3>

        <div id="monthlyList"></div>

    </section>

    <!-- BOTTOM NAV -->

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showPage('dashboard',this)">🏠</button>
        <button class="nav-item" onclick="showPage('transactions',this)">📋</button>
        <button class="nav-item" onclick="showPage('monthly',this)">📊</button>
        <button class="nav-item" onclick="openModal()">⚙️</button>
    </div>

    <button id="fab" onclick="openModal()">+</button>

</div>

<!-- MODAL -->

<div id="modalBg">

    <div class="modal">

        <h2 id="modalTitle">Add Transaction</h2>

        <input
            type="text"
            id="displayNominal"
            placeholder="Nominal"
            oninput="formatNominal(this)">

        <input type="hidden" id="realNominal">

        <input
            type="text"
            id="description"
            placeholder="Description">

        <select id="type">
            <option value="income">Income (+)</option>
            <option value="expense">Expense (-)</option>
        </select>

        <input type="date" id="date">

        <button class="btn save" onclick="saveTransaction()">Save Transaction</button>
        <button class="btn cancel" onclick="closeModal()">Cancel</button>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyDyp9xh0IRzpahTg82BXsxXQLtgvdqJJwc",
  authDomain: "home-finance-9219a.firebaseapp.com",
  projectId: "home-finance-9219a",
  storageBucket: "home-finance-9219a.firebasestorage.app",
  messagingSenderId: "774004827415",
  appId: "1:774004827415:web:d771bff53b2d38827c0352"
};

const app = initializeApp(firebaseConfig);
const dbFirestore = getFirestore(app);

let db = [];
let editIndex = null;

/* LOGIN */

window.login = function(){

    const user = document.getElementById('username').value.trim();

    if(!user){
        alert('Masukkan username');
        return;
    }

    localStorage.setItem('hf_user', user);
    startApp();
}

window.logout = function(){

    localStorage.removeItem('hf_user');
    location.reload();
}

function startApp(){

    const user = localStorage.getItem('hf_user');

    if(user){

        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        document.getElementById('welcomeText').innerText = 'Hi, ' + user;

        loadDatabase();
    }
}

startApp();

/* LOAD DATABASE */

async function loadDatabase(){

    db = [];

    const querySnapshot =
    await getDocs(collection(dbFirestore, "transactions"));

    querySnapshot.forEach(docSnap => {

        db.push({
            id: docSnap.id,
            ...docSnap.data()
        });

    });

    db.sort((a,b) => new Date(a.date) - new Date(b.date));

    renderDashboard();
    renderHistory();
    renderMonthly();
}

/* FORMAT */

function rupiah(v){
    return 'Rp ' + Number(v).toLocaleString('id-ID');
}

window.formatNominal = function(el){

    let value = el.value.replace(/\D/g,'');

    document.getElementById('realNominal').value = value;

    el.value = new Intl.NumberFormat('id-ID').format(value);
}

/* MODAL */

window.openModal = function(){

    document.getElementById('modalTitle').innerText =
    editIndex === null ? 'Add Transaction' : 'Edit Transaction';

    document.getElementById('modalBg').classList.add('active');
}

window.closeModal = function(){

    document.getElementById('modalBg').classList.remove('active');

    editIndex = null;

    document.getElementById('displayNominal').value = '';
    document.getElementById('realNominal').value = '';
    document.getElementById('description').value = '';
    document.getElementById('type').value = 'income';
    document.getElementById('date').valueAsDate = new Date();
}

/* SAVE */

window.saveTransaction = async function(){

    const nominal = document.getElementById('realNominal').value;
    const description = document.getElementById('description').value.trim();
    const type = document.getElementById('type').value;
    const date = document.getElementById('date').value;

    if(!nominal || !description || !date){
        alert('Isi semua field');
        return;
    }

    const payload = {
        nominal:parseInt(nominal),
        description,
        type,
        date
    };

    if(editIndex !== null){

        await updateDoc(
            doc(dbFirestore, "transactions", db[editIndex].id),
            payload
        );

    }else{

        await addDoc(
            collection(dbFirestore, "transactions"),
            payload
        );
    }

    closeModal();
    loadDatabase();
}

/* EDIT */

window.editTransaction = function(index){

    const item = db[index];

    editIndex = index;

    document.getElementById('realNominal').value = item.nominal;

    document.getElementById('displayNominal').value =
    new Intl.NumberFormat('id-ID').format(item.nominal);

    document.getElementById('description').value = item.description;
    document.getElementById('type').value = item.type;
    document.getElementById('date').value = item.date;

    openModal();
}

/* NAV */

window.showPage = function(id,el){

    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-item').forEach(nav=>{
        nav.classList.remove('active');
    });

    el.classList.add('active');
}

/* DASHBOARD */

function renderDashboard(){

    let income = 0;
    let expense = 0;

    const recentList = document.getElementById('recentList');

    recentList.innerHTML = '';

    db.forEach(item => {
        if(item.type === 'income'){
            income += item.nominal;
        }else{
            expense += item.nominal;
        }
    });

    document.getElementById('balance').innerText = rupiah(income - expense);
    document.getElementById('income').innerText = rupiah(income);
    document.getElementById('expense').innerText = rupiah(expense);
    document.getElementById('incomeMini').innerText = '+ ' + rupiah(income);
    document.getElementById('expenseMini').innerText = '- ' + rupiah(expense);

    const total = income + expense || 1;

    document.getElementById('incomeBar').style.width =
    (income / total * 100) + '%';

    document.getElementById('expenseBar').style.width =
    (expense / total * 100) + '%';

    db.slice().reverse().slice(0,5).forEach(item => {
        recentList.innerHTML += transactionCard(item, false);
    });

    generateChart(db);
}

/* HISTORY */

function renderHistory(){

    const list = document.getElementById('historyList');

    list.innerHTML = '';

    const keyword =
    document.getElementById('historySearch').value.toLowerCase();

    db.slice().reverse()
    .filter(item => item.description.toLowerCase().includes(keyword))
    .forEach(item => {

        const index = db.indexOf(item);

        list.innerHTML += transactionCard(item, true, index);
    });
}

/* CARD COMPONENT */

function transactionCard(item, showEdit, index){

    const isIncome = item.type === 'income';

    return `
        <div class="tx-card">

            <div class="tx-left">
                <div class="tx-icon">
                    ${isIncome ? '↙️' : '↗️'}
                </div>

                <div>
                    <h4>${item.description}</h4>
                    <small>${item.date} • ${item.type}</small>
                </div>
            </div>

            <div style="text-align:right">
                <div class="${isIncome ? 'amount-income' : 'amount-expense'}">
                    ${isIncome ? '+' : '-'} ${rupiah(item.nominal)}
                </div>

                ${showEdit ? `
                    <button
                        class="edit-btn"
                        onclick="editTransaction(${index})">
                        Edit
                    </button>
                ` : ''}
            </div>

        </div>
    `;
}

/* MONTHLY */

function renderMonthly(){

    const list = document.getElementById('monthlyList');

    list.innerHTML = '';

    let grouped = {};

    db.forEach(item => {

        const d = new Date(item.date);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

        if(!grouped[key]){
            grouped[key] = {
                income:0,
                expense:0
            };
        }

        if(item.type === 'income'){
            grouped[key].income += item.nominal;
        }else{
            grouped[key].expense += item.nominal;
        }
    });

    Object.keys(grouped).sort().reverse().forEach(key => {

        const data = grouped[key];
        const balance = data.income - data.expense;

        list.innerHTML += `
            <div class="month-card">
                <h3>${key}</h3>

                <div class="month-row">
                    <span>Income</span>
                    <strong style="color:#35e58a">${rupiah(data.income)}</strong>
                </div>

                <div class="month-row">
                    <span>Expense</span>
                    <strong style="color:#ff5b7f">${rupiah(data.expense)}</strong>
                </div>

                <div class="month-row">
                    <span>Balance</span>
                    <strong>${rupiah(balance)}</strong>
                </div>
            </div>
        `;
    });
}

/* CHART */

function generateChart(data){

    if(data.length === 0){
        document.getElementById('lineChart')
        .setAttribute('points','10,190 590,190');
        return;
    }

    let total = 0;
    let points = [];

    data.forEach((item,index) => {

        if(item.type === 'income'){
            total += item.nominal;
        }else{
            total -= item.nominal;
        }

        const x = (index / (data.length - 1 || 1)) * 560 + 20;

        const y = 190 - Math.min(Math.max(total / 10000, -40), 160);

        points.push(`${x},${y}`);
    });

    document.getElementById('lineChart')
    .setAttribute('points', points.join(' '));
}

document.getElementById('date').valueAsDate = new Date();

</script>

</body>
</html>
