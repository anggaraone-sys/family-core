<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCore - Smart Tracker</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text-main: #1e293b; --text-sub: #64748b; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; color: var(--text-main); min-height: 100vh; }

        /* Sidebar */
        aside { width: 240px; background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .nav-active { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .nav-idle { color: var(--text-sub); }
        .nav-idle:hover { background: #f1f5f9; }

        /* Main Content */
        main { flex: 1; padding: 2.5rem; max-width: 1200px; }
        header h1 { font-size: 1.8rem; margin: 0 0 2rem 0; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .card p { margin: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.025em; }
        .card h2 { margin: 0.5rem 0 0 0; font-size: 1.75rem; }

        /* Layout Grid */
        .content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; display: block; }

        /* Form */
        .form-box { background: white; padding: 2rem; border-radius: 24px; border: 1px solid #f1f5f9; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-sub); margin-bottom: 0.5rem; margin-left: 0.5rem; }
        input, select { width: 100%; padding: 1rem; border-radius: 16px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn-submit { width: 100%; padding: 1rem; border-radius: 16px; border: none; background: var(--primary); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }

        /* List */
        .history-box { background: white; padding: 1.5rem; border-radius: 24px; border: 1px solid #f1f5f9; min-height: 400px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-radius: 16px; transition: 0.2s; margin-bottom: 0.5rem; }
        .item:hover { background: #f8fafc; }
        .item-info b { display: block; font-size: 0.95rem; }
        .item-info small { color: var(--text-sub); font-size: 0.75rem; }
        .amt { font-weight: 700; font-size: 1rem; }
        .text-up { color: #10b981; }
        .text-down { color: #ef4444; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; border-right: none; border-bottom: 1px solid #eee; padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><span>🟦</span> FinCore</div>
        <div class="nav-item nav-active">📊 Dashboard</div>
        <div class="nav-item nav-idle">💸 Transaksi</div>
    </aside>

    <main>
        <header><h1>Main Dashboard</h1></header>
        
        <div class="stats-grid">
            <div class="card">
                <p>Total Balance</p>
                <h2 id="totalSaldo" style="color: var(--primary)">Rp 0</h2>
            </div>
            <div class="card">
                <p style="color: #10b981">↑ Total Income</p>
                <h2 id="totalMasuk">Rp 0</h2>
            </div>
            <div class="card">
                <p style="color: #ef4444">↓ Total Expenses</p>
                <h2 id="totalKeluar">Rp 0</h2>
            </div>
        </div>

        <div class="content-grid">
            <div>
                <span class="section-title">Tambah Transaksi</span>
                <div class="form-box">
                    <div class="input-group">
                        <label>NOMINAL (RP)</label>
                        <!-- Input nominal dengan format otomatis -->
                        <input type="text" id="nominalDisplay" placeholder="0" oninput="formatRupiah(this)">
                        <input type="hidden" id="nominalReal">
                    </div>
                    <div class="input-group">
                        <label>KETERANGAN</label>
                        <input type="text" id="ket" placeholder="Misal: Gaji Bulanan, Makan Siang...">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label>JENIS</label>
                            <select id="tipe">
                                <option value="Pemasukan">Pemasukan (+)</option>
                                <option value="Pengeluaran">Pengeluaran (-)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>TANGGAL</label>
                            <input type="date" id="tgl">
                        </div>
                    </div>
                    <button onclick="simpan()" class="btn-submit">Simpan Transaksi</button>
                </div>
            </div>

            <div>
                <span class="section-title">Riwayat Terakhir</span>
                <div class="history-box" id="daftar">
                    <!-- Data List -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let data = JSON.parse(localStorage.getItem('fincore_vfinal')) || [];

        // FUNGSI FORMAT RUPIAH OTOMATIS SAAT KETIK
        function formatRupiah(input) {
            let value = input.value.replace(/[^,\d]/g, '').toString();
            let split = value.split(',');
            let sisa = split[0].length % 3;
            let rupiah = split[0].substr(0, sisa);
            let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

            if (ribuan) {
                let separator = sisa ? '.' : '';
                rupiah += separator + ribuan.join('.');
            }

            input.value = rupiah;
            // Simpan angka asli ke hidden input untuk kalkulasi
            document.getElementById('nominalReal').value = value;
        }

        function simpan() {
            const nom = document.getElementById('nominalReal').value;
            const ket = document.getElementById('ket').value;
            const tgl = document.getElementById('tgl').value;
            const tipe = document.getElementById('tipe').value;

            if(!nom || !ket || !tgl) return alert("Lengkapi semua kolom!");

            data.push({ id: Date.now(), nom: parseInt(nom), ket, tgl, tipe });
            localStorage.setItem('fincore_vfinal', JSON.stringify(data));
            render();
            
            // Reset
            document.getElementById('nominalDisplay').value = '';
            document.getElementById('nominalReal').value = '';
            document.getElementById('ket').value = '';
        }

        function render() {
            const list = document.getElementById('daftar');
            list.innerHTML = '';
            let masuk = 0, keluar = 0;

            [...data].reverse().forEach(item => {
                if(item.tipe === 'Pemasukan') masuk += item.nom;
                else keluar += item.nom;

                list.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <b>${item.ket}</b>
                            <small>${item.tgl}</small>
                        </div>
                        <div class="amt ${item.tipe === 'Pemasukan' ? 'text-up' : 'text-down'}">
                            ${item.tipe === 'Pemasukan' ? '+' : '-'} ${item.nom.toLocaleString('id-ID')}
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalMasuk').innerText = `Rp ${masuk.toLocaleString('id-ID')}`;
            document.getElementById('totalKeluar').innerText = `Rp ${keluar.toLocaleString('id-ID')}`;
            document.getElementById('totalSaldo').innerText = `Rp ${(masuk - keluar).toLocaleString('id-ID')}`;
        }

        document.getElementById('tgl').valueAsDate = new Date();
        render();
    </script>
</body>
</html>
