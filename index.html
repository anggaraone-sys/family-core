<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Finance</title>

<style>

:root{
    --blue:#2db7ff;
    --blue2:#5d8dff;
    --pink:#ff4fb8;
    --pink2:#ff95d6;
    --bg:#f4f8ff;
    --white:#ffffff;
    --text:#071b56;
    --muted:#6d7db3;
    --green:#17c36b;
    --red:#ff5a8c;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#b8e8ff,transparent 35%),
    radial-gradient(circle at top right,#ffd0ea,transparent 35%),
    linear-gradient(180deg,#f4f8ff,#fff7fc);
    min-height:100vh;
    color:var(--text);
}

button,input,select{
    font-family:inherit;
}

#loginPage{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:25px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(20px);
    border-radius:35px;
    padding:35px 25px;
    box-shadow:0 20px 60px rgba(77,107,190,.15);
    border:1px solid rgba(255,255,255,.9);
}

.logo-wrap{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:35px;
}

.logo-icon{
    width:70px;
    height:70px;
    border-radius:22px;
    background:linear-gradient(135deg,var(--blue),var(--pink));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    color:white;
}

.logo-wrap h1{
    font-size:28px;
}

.logo-wrap p{
    color:var(--muted);
    margin-top:5px;
}

.login-title{
    font-size:34px;
    margin-bottom:10px;
}

.login-sub{
    color:var(--muted);
    margin-bottom:30px;
}

.input-wrap{
    background:white;
    border-radius:22px;
    padding:16px;
    margin-bottom:18px;
    box-shadow:0 10px 30px rgba(67,98,170,.08);
}

.input-wrap input{
    width:100%;
    border:none;
    outline:none;
    font-size:16px;
    background:transparent;
}

.main-btn{
    width:100%;
    border:none;
    padding:18px;
    border-radius:24px;
    background:linear-gradient(90deg,var(--blue),var(--pink));
    color:white;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 12px 30px rgba(255,79,184,.2);
}

#app{
    display:none;
    max-width:500px;
    margin:auto;
    min-height:100vh;
    padding:20px 18px 120px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}

.profile{
    display:flex;
    align-items:center;
    gap:14px;
}

.avatar{
    width:68px;
    height:68px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--pink));
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:32px;
    border:4px solid white;
}

.profile small{
    color:var(--muted);
}

.logout{
    border:none;
    background:white;
    padding:12px 16px;
    border-radius:18px;
    color:var(--pink);
    font-weight:700;
    cursor:pointer;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.hero-card{
    position:relative;
    overflow:hidden;
    min-height:280px;
    border-radius:38px;
    padding:28px;
    color:white;
    background:
    linear-gradient(135deg,#31bcff,#ff79c8);
    box-shadow:0 20px 50px rgba(92,110,210,.2);

    background-image:
    linear-gradient(135deg,rgba(45,183,255,.9),rgba(255,79,184,.8)),
    url('plane.png');

    background-repeat:no-repeat;
    background-position:right bottom;
    background-size:220px;
}

.hero-card small{
    font-size:16px;
    font-weight:700;
}

.hero-card h1{
    font-size:48px;
    margin:14px 0 25px;
}

.hero-actions{
    display:flex;
    gap:12px;
}

.hero-btn{
    border:none;
    background:rgba(255,255,255,.2);
    backdrop-filter:blur(10px);
    color:white;
    padding:14px 18px;
    border-radius:18px;
    font-weight:700;
    cursor:pointer;
}

.quick-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin:18px 0;
}

.quick-card{
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(12px);
    border-radius:24px;
    padding:18px 14px;
    box-shadow:0 12px 30px rgba(80,102,180,.08);
}

.quick-card small{
    color:var(--muted);
}

.quick-card h3{
    margin-top:10px;
    font-size:20px;
}

.soft-card{
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 12px 30px rgba(80,102,180,.08);
}

.progress{
    height:12px;
    background:#dfe8ff;
    border-radius:20px;
    overflow:hidden;
    margin-top:14px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--blue),var(--pink));
}

.section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px 0 14px;
}

.section-title h3{
    font-size:20px;
}

.section-title button{
    border:none;
    background:none;
    color:var(--blue2);
    font-weight:700;
    cursor:pointer;
}

.list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.tx-card{
    background:rgba(255,255,255,.85);
    border-radius:24px;
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    box-shadow:0 10px 25px rgba(80,102,180,.07);
}

.tx-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.tx-icon{
    width:54px;
    height:54px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--blue),var(--pink));
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:24px;
}

.tx-card small{
    color:var(--muted);
}

.amount-income{
    color:var(--green);
    font-weight:800;
}

.amount-expense{
    color:var(--red);
    font-weight:800;
}

.action-row{
    display:flex;
    gap:6px;
    margin-top:8px;
    justify-content:flex-end;
}

.edit-btn,.delete-btn{
    border:none;
    padding:8px 10px;
    border-radius:10px;
    color:white;
    font-size:12px;
    cursor:pointer;
}

.edit-btn{
    background:var(--blue2);
}

.delete-btn{
    background:var(--red);
}

.search{
    width:100%;
    padding:16px;
    border:none;
    border-radius:20px;
    margin-bottom:16px;
    outline:none;
    background:white;
    box-shadow:0 10px 25px rgba(80,102,180,.07);
}

.month-card{
    background:white;
    border-radius:24px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 10px 25px rgba(80,102,180,.07);
    cursor:pointer;
}

.month-row{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.profile-card{
    background:white;
    border-radius:28px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 10px 25px rgba(80,102,180,.07);
}

.form-field{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#eef4ff;
    margin-top:12px;
}

.bottom-nav{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:14px;
    width:calc(100% - 30px);
    max-width:470px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(14px);
    border-radius:30px;
    display:grid;
    grid-template-columns:1fr 1fr 90px 1fr 1fr;
    align-items:center;
    min-height:82px;
    box-shadow:0 18px 45px rgba(77,107,190,.15);
}

.nav-btn{
    border:none;
    background:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    cursor:pointer;
}

.nav-btn span{
    font-size:22px;
}

.nav-btn.active{
    color:var(--blue2);
}

.add-btn{
    width:76px;
    height:76px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--pink));
    color:white;
    border:7px solid #f5f8ff;
    font-size:36px;
    margin-top:-38px;
    cursor:pointer;
}

.modal-bg{
    position:fixed;
    inset:0;
    background:rgba(25,42,90,.25);
    backdrop-filter:blur(12px);
    display:none;
    align-items:flex-end;
    z-index:200;
}

.modal-bg.active{
    display:flex;
}

.modal{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:35px 35px 0 0;
    padding:25px 20px 30px;
    margin:auto;
}

.modal h2{
    margin-bottom:18px;
}

.modal-btn{
    width:100%;
    border:none;
    padding:16px;
    border-radius:18px;
    margin-top:10px;
    cursor:pointer;
    font-weight:700;
}

.save-btn{
    background:linear-gradient(90deg,var(--blue),var(--pink));
    color:white;
}

.cancel-btn{
    background:#eef4ff;
    color:var(--text);
}

@media(max-width:390px){

    .quick-grid{
        grid-template-columns:1fr;
    }

    .hero-card h1{
        font-size:38px;
    }

}

</style>
</head>

<body>

<div id="loginPage">

    <div class="login-card">

        <div class="logo-wrap">
            <div class="logo-icon">👨‍👩‍👧</div>

            <div>
                <h1>Home Finance</h1>
                <p>Family Finance Tracker</p>
            </div>
        </div>

        <div class="login-title">
            Welcome 👋
        </div>

        <div class="login-sub">
            Kelola keuangan keluarga jadi lebih mudah
        </div>

        <div class="input-wrap">
            <input type="text" id="username" placeholder="Username">
        </div>

        <button class="main-btn" onclick="login()">
            Masuk Sekarang
        </button>

    </div>

</div>

<div id="app">

    <div class="topbar">

        <div class="profile">

            <div class="avatar" id="familyIcon">
                👨‍👩‍👧
            </div>

            <div>
                <h2 id="familyTitle">
                    Hi Family Winata 👋
                </h2>

                <small>
                    Home Finance
                </small>
            </div>

        </div>

        <button class="logout" onclick="logout()">
            Logout
        </button>

    </div>

    <section id="beranda" class="page active">

        <div class="hero-card">

            <small>Total Balance</small>

            <h1 id="balance">
                Rp 0
            </h1>

            <div class="hero-actions">

                <button class="hero-btn" onclick="openModal('income')">
                    ➕ Tambah
                </button>

                <button class="hero-btn" onclick="openModal('expense')">
                    ➖ Kurang
                </button>

            </div>

        </div>

    </section>

</div>

</body>
</html>
