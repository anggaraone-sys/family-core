<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCore - Catatan Keuangan</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex">

    <!-- Sidebar (Hanya Desktop) -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r p-6 space-y-8">
        <div class="flex items-center space-x-2 text-indigo-600">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">F</div>
            <span class="text-xl font-bold text-slate-800">FinCore</span>
        </div>
        <nav class="space-y-1">
            <a href="#" class="flex items-center space-x-3 p-3 bg-indigo-50 text-indigo-600 rounded-xl font-semibold">
                <span>📊 Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 text-slate-400 hover:bg-slate-50 rounded-xl transition">
                <span>💸 Transaksi</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 text-slate-400 hover:bg-slate-50 rounded-xl transition">
                <span>⚙️ Settings</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Main Dashboard</h1>
            <div class="flex items-center space-x-4">
                <input type="text" placeholder="Search..." class="hidden md:block bg-white border rounded-full px-4 py-2 text-sm outline-none focus:ring-2 ring-indigo-100">
                <div class="w-10 h-10 bg-slate-200 rounded-full border-2 border-white shadow-sm"></div>
            </div>
        </header>

        <!-- Top Cards (Ringkasan) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50">
                <p class="text-slate-400 text-sm font-semibold mb-1">Total Balance</p>
                <h3 id="totalSaldo" class="text-2xl font-bold text-slate-800">Rp 0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50">
                <p class="text-slate-400 text-sm font-semibold mb-1 text-green-500">↑ Total Income</p>
                <h3 id="totalMasuk" class="text-2xl font-bold text-slate-800">Rp 0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50">
                <p class="text-slate-400 text-sm font-semibold mb-1 text-red-500">↓ Total Expenses</p>
                <h3 id="totalKeluar" class="text-2xl font-bold text-slate-800">Rp 0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Chart & Form -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Chart Area -->
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-800">Cash Flow</h3>
                        <span class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold">Monthly</span>
                    </div>
                    <canvas id="cashFlowChart" height="120"></canvas>
                </div>

                <!-- Form Input -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50">
                    <h3 class="font-bold text-slate-800 mb-6 text-lg text-center">Tambah Catatan Keuangan</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Nominal</label>
                            <input type="number" id="nominal" placeholder="0" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition font-bold text-lg">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Kategori / Ket</label>
                            <input type="text" id="ket" placeholder="Misal: Gaji, Makan, Transport..." class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Jenis</label>
                            <select id="tipe" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition appearance-none cursor-pointer">
                                <option value="Pemasukan">Pemasukan</option>
                                <option value="Pengeluaran">Pengeluaran</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Tanggal</label>
                            <input type="date" id="tgl" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition">
                        </div>
                    </div>
                    <button onclick="simpan()" class="w-full mt-6 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-[0.98]">Add Transaction</button>
                </div>
            </div>

            <!-- Right: Recent Activity -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-800">Recent Transactions</h3>
                        <button class="text-indigo-600 text-xs font-bold">+</button>
                    </div>
                    <div id="daftar" class="space-y-4">
                        <!-- List Item Placeholder -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let data = JSON.parse(localStorage.getItem('fincore_data')) || [];
        let chart;

        function simpan() {
            const nominal = document.getElementById('nominal').value;
            const tgl = document.getElementById('tgl').value;
            const ket = document.getElementById('ket').value;
            const tipe = document.getElementById('tipe').value;

            if(!nominal || !tgl || !ket) return alert("Lengkapi data dahulu!");

            data.push({
                id: Date.now(),
                tgl: tgl,
                tipe: tipe,
                nominal: parseInt(nominal),
                ket: ket
            });

            localStorage.setItem('fincore_data', JSON.stringify(data));
            render();
            
            // Reset input
            document.getElementById('nominal').value = '';
            document.getElementById('ket').value = '';
        }

        function hapus(id) {
            data = data.filter(item => item.id !== id);
            localStorage.setItem('fincore_data', JSON.stringify(data));
            render();
        }

        function render() {
            const list = document.getElementById('daftar');
            list.innerHTML = '';
            
            let masuk = 0, keluar = 0;
            const chartData = { labels: [], values: [] };

            [...data].sort((a,b) => new Date(a.tgl) - new Date(b.tgl)).forEach(item => {
                if(item.tipe === 'Pemasukan') masuk += item.nominal;
                else keluar += item.nominal;

                // Data untuk chart
                chartData.labels.push(item.tgl.split('-').slice(1).join('/'));
                chartData.values.push(masuk - keluar);
            });

            // Update Cards
            document.getElementById('totalMasuk').innerText = `Rp ${masuk.toLocaleString()}`;
            document.getElementById('totalKeluar').innerText = `Rp ${keluar.toLocaleString()}`;
            document.getElementById('totalSaldo').innerText = `Rp ${(masuk - keluar).toLocaleString()}`;

            // Render List (5 Terakhir)
            [...data].reverse().slice(0, 5).forEach(item => {
                list.innerHTML += `
                    <div class="flex items-center justify-between group">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 ${item.tipe === 'Pemasukan' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'} rounded-xl flex items-center justify-center font-bold">
                                ${item.tipe === 'Pemasukan' ? '↑' : '↓'}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">${item.ket}</p>
                                <p class="text-[10px] text-slate-400 font-medium">${item.tgl}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold ${item.tipe === 'Pemasukan' ? 'text-green-500' : 'text-red-500'}">
                                ${item.tipe === 'Pemasukan' ? '+' : '-'}Rp ${item.nominal.toLocaleString()}
                            </p>
                            <button onclick="hapus(${item.id})" class="text-[10px] text-slate-200 group-hover:text-red-300 transition">Delete</button>
                        </div>
                    </div>
                `;
            });

            updateChart(chartData);
        }

        function updateChart(cData) {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            if(chart) chart.destroy();
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(79, 70, 229, 0.2)');
            gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: cData.labels,
                    datasets: [{
                        label: 'Net Balance',
                        data: cData.values,
                        borderColor: '#4f46e5',
                        borderWidth: 3,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        document.getElementById('tgl').valueAsDate = new Date();
        render();
    </script>
</body>
</html>
